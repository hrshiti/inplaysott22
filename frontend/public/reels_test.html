<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InPlay Reels Test Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        /* Reels Style Container (9:16 Aspect Ratio) */
        .reels-container {
            width: 100vw;
            height: 100vh;
            max-width: 450px; /* Mobile width limit on PC */
            max-height: 800px;
            position: relative;
            background: #111;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border-radius: 12px;
            overflow: hidden;
        }
        @media (max-width: 500px) {
            .reels-container {
                width: 100vw;
                height: 100vh;
                max-width: none;
                max-height: none;
                border-radius: 0;
            }
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* This makes it "Reels Format" - Full Screen Fill */
            background: #000;
        }
        /* UI Overlays */
        .overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.4) 100%);
            color: white;
            z-index: 10;
        }
        .top-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .bottom-info {
            margin-bottom: 20px;
        }
        .title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .quality-badge {
            background: #ff0000;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
        }
        .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            pointer-events: auto;
            z-index: 20;
        }
        .play-icon {
            width: 0;
            height: 0;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 25px solid white;
            margin-left: 5px;
        }
        .progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.2);
        }
        .progress-bar {
            height: 100%;
            background: #ff0000;
            width: 0%;
            box-shadow: 0 0 10px #ff0000;
        }
    </style>
</head>
<body>

    <div class="reels-container">
        <video id="video" playsinline></video>
        
        <div class="overlay">
            <div class="top-info">
                <div class="quality-badge" id="qualityLabel">HD AUTO</div>
            </div>
            
            <div class="bottom-info">
                <div class="title">InPlay Reels Player</div>
                <div style="font-size: 14px; opacity: 0.8;">HLS Test Stream</div>
            </div>
        </div>

        <button class="play-btn" id="playBtn" onclick="togglePlay()">
            <div class="play-icon" id="playIcon"></div>
        </button>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const playBtn = document.getElementById('playBtn');
        const progressBar = document.getElementById('progressBar');
        const qualityLabel = document.getElementById('qualityLabel');
        const videoSrc = 'https://d3ezguscssopmp.cloudfront.net/videos/quickbyte_episode/69e76277d16017a6d4fd12e5/master.m3u8';

        if (Hls.isSupported()) {
            const hls = new Hls({
                startLevel: -1, // Auto
                abrEwmaDefaultEstimate: 10000000 // 10Mbps force high quality
            });
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                console.log('Manifest parsed, ready to play!');
                // Update quality label when level changes
                hls.on(Hls.Events.LEVEL_SWITCHED, function(event, data) {
                    const level = hls.levels[data.level];
                    qualityLabel.innerText = level.height + 'P';
                });
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
        }

        function togglePlay() {
            if (video.paused) {
                video.play();
                playBtn.style.opacity = '0';
            } else {
                video.pause();
                playBtn.style.opacity = '1';
            }
        }

        video.addEventListener('timeupdate', () => {
            const percentage = (video.currentTime / video.duration) * 100;
            progressBar.style.width = percentage + '%';
        });

        video.addEventListener('ended', () => {
            playBtn.style.opacity = '1';
        });
        
        // Hide play button when video starts playing via other methods
        video.addEventListener('play', () => {
            playBtn.style.opacity = '0';
        });
    </script>
</body>
</html>
